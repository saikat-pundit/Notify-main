name: Extract Notify ZIP

on:
  workflow_dispatch:  # Manual trigger

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP and flatten directory
        run: |
          unzip -q Notify-main.zip
          rsync -a Notify-main/ ./
          
          # THE FIX: Delete the workflow file that was extracted from the zip
          # so GitHub doesn't block the commit
          rm -rf .github/workflows/build.yml 
          
          rm -rf Notify-main Notify-main.zip

      - name: Commit and push extracted files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Extract Notify repo to root directory"
