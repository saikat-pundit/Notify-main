name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        env:
          # Pass the secret to Gradle
          COMMAND_GIST_TOKEN: ${{ secrets.COMMAND_GIST_TOKEN }}
        run: gradle :app:assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Notify.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Notify-App-Build
          path: app/build/outputs/apk/debug/Notify.apk

      # NEW STEP: Create/Update GitHub Release
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Notify Build
          files: app/build/outputs/apk/debug/Notify.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
