name: Gist Watcher

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check and update Gist
        env:
          GITHUB_TOKEN: ${{ secrets.COMMAND_GIST_TOKEN }}
        run: |
          GIST_ID="ccc67afe0ea74bc98cfd654f5fa9905b"
          GIST_API_URL="https://api.github.com/gists/$GIST_ID"
          
          # Get current content with error checking
          RESPONSE=$(curl -s -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" \
            $GIST_API_URL)
          
          HTTP_CODE=${RESPONSE: -3}
          BODY=${RESPONSE%???}
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error fetching gist: HTTP $HTTP_CODE"
            exit 1
          fi
          
          # Extract content
          CURRENT_CONTENT=$(echo "$BODY" | jq -r '.files."command.txt".content // "FILE_NOT_FOUND"')
          
          if [ "$CURRENT_CONTENT" = "FILE_NOT_FOUND" ]; then
            echo "Error: command.txt not found in gist"
            echo "Available files:"
            echo "$BODY" | jq -r '.files | keys[]'
            exit 1
          fi
          
          echo "Current content: '$CURRENT_CONTENT'"
          
          # Check if content is exactly "IDLE"
          if [ "$CURRENT_CONTENT" = "IDLE" ]; then
            echo "Content is IDLE, updating to realme RMX3950:RING"
            
            # Update the gist
            UPDATE_RESPONSE=$(curl -s -X PATCH -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"files\": {
                  \"command.txt\": {
                    \"content\": \"realme RMX3950:RING\"
                  }
                }
              }" \
              $GIST_API_URL)
            
            if echo "$UPDATE_RESPONSE" | jq -e '.files."command.txt".content' > /dev/null; then
              echo "✅ Gist updated successfully to: realme RMX3950:RING"
            else
              echo "❌ Update failed"
              echo "$UPDATE_RESPONSE"
              exit 1
            fi
          else
            echo "No update needed - current content is not 'IDLE'"
          fi
